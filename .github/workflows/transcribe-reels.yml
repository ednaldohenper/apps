name: Transcrever Reels

# Transcreve a FALA de Reels do Instagram (via Apify) e salva o .md no vault.
# Dispara MANUALMENTE na aba Actions. Isolado: não toca no robô de mercado.
# Usa o mesmo APIFY_TOKEN/VAULT_TOKEN que os outros workflows.
on:
  workflow_dispatch:
    inputs:
      transcribe_actor:
        description: "ID do ator de transcrição da Apify Store (formato usuario~ator). Ex.: busque 'instagram transcript' ou 'whisper'."
        required: true
        default: ""
      reel_urls:
        description: "Opcional: lista de URLs em JSON (ex.: [\"https://instagram.com/p/AAA/\"]). Vazio = os 10 parceiros do script."
        required: false
        default: ""
      ig_actor:
        description: "Opcional: ator do Instagram que resolve o videoUrl (default apify~instagram-scraper)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Trazer o vault (pra salvar o arquivo)
        uses: actions/checkout@v4
        with:
          repository: ednaldohenper/obsidian-vault
          token: ${{ secrets.VAULT_TOKEN }}
          path: vault

      - name: Transcrever
        env:
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}
          TRANSCRIBE_ACTOR: ${{ inputs.transcribe_actor }}
          REEL_URLS:        ${{ inputs.reel_urls }}
          IG_ACTOR:         ${{ inputs.ig_actor }}
          VAULT_DIR:        vault
          LANG2:            pt
        run: node scripts/transcribe-reels.mjs

      - name: Salvar transcrições no vault
        working-directory: vault
        run: |
          git config user.name  "instagram-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "transcricoes: reels de referencia ($(date -u +%Y-%m-%d))" || echo "Sem mudanças"
          git pull --rebase origin main
          git push
